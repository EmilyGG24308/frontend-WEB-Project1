<!DOCTYPE html>
<html>
<head>
  <title>Series Tracker</title>
  <link rel="stylesheet" href="styles.css">
  
</head>
<body>

<div class="app">

  <header>
    <h1>Series Tracker</h1>
  </header>

  <section class="form-section">
    <form id="form">
      <input id="name" placeholder="Name">
      <input id="desc" placeholder="Description">
      <input id="img" placeholder="Image URL">
      <input id="rating" placeholder="Rating (0-5)">
      <input id="genre1" placeholder="Genre 1">
      <input id="genre2" placeholder="Genre 2">
      <button type="submit">Add Series</button>
    </form>
  </section>

  <section class="controls">
    <input id="search" placeholder="Search series...">
    <button onclick="searchSeries()">Search</button>
    <button onclick="loadSeries()">Reset</button>

    < --sort buttons -->
    <button onclick="sortSeries('name', 'asc')">Sort by Name (A-Z)</button>
    <button onclick="sortSeries('name', 'desc')">Sort by Name (Z-A)</button>
    <button onclick="sortSeries('rating', 'desc')">Sort by Rating(5-0.5)</button>
  </section>

  <ul id="list"></ul>
  <button type="button" onclick="exportCSV(window.currentData)">Download CSV</button>
  

  <section class="pagination">
    <button onclick="prevPage()">⬅ Prev</button>
    <button onclick="nextPage()">Next ➡</button>
  </section>

</div>

<script src="app.js"></script>

</body>
</html>
